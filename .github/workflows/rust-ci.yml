name: Rust CI

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  clippy_and_test:
    name: Clippy + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (GTK/WebKit for Tauri)
        run: |
          set -euxo pipefail
          sudo apt-get update
          # Try WebKitGTK 4.1 first; fall back to 4.0 if 4.1 is unavailable on the runner image
          if ! sudo apt-get install -y libwebkit2gtk-4.1-dev; then
            echo "libwebkit2gtk-4.1-dev unavailable; falling back to libwebkit2gtk-4.0-dev"
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: 1.8.3

      - name: Install backend dependencies
        run: |
          # Install Poetry first
          pip install poetry
          # Install the package in development mode with all dependencies
          poetry install --no-interaction --with dev
          # Explicitly install the package in development mode
          pip install -e .
          # Verify the package is installed and can be imported
          python -c "import sys; print('Python path:', sys.path)"
          python -c "import importlib.util; print('cartaos spec:', importlib.util.find_spec('cartaos')); import cartaos; print(f'cartaos path: {cartaos.__file__}')"
        working-directory: backend

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check (cargo fmt)
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        env:
          PYTHONPATH: ../backend
        run: cargo test --all --verbose
