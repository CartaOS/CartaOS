name: Rust CI

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  clippy_and_test:
    name: Clippy + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (GTK/WebKit for Tauri)
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          # Try libwebkit2gtk-4.1-dev first (Ubuntu 24.04+), fallback to 4.0 on older images
          if sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config; then
            echo "Installed WebKitGTK 4.1"
          else
            echo "Falling back to WebKitGTK 4.0"
            sudo apt-get install -y \
              libgtk-3-dev \
              libwebkit2gtk-4.0-dev \
              libayatana-appindicator3-dev \
              librsvg2-dev \
              pkg-config
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: 1.8.3

      - name: Install backend dependencies
        run: poetry install --no-interaction --no-root --with dev
        working-directory: backend

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check (cargo fmt)
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all --verbose
