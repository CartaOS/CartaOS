name: Lighthouse CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build app
        run: npm run build
        working-directory: frontend

      - name: Start server
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 --strictPort &
          npx wait-on http://127.0.0.1:4173

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .github/lighthouserc.json

  performance-budget:
    name: Performance Budget
    runs-on: ubuntu-latest
    needs: lighthouse
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Lighthouse CI budget check
        run: |
          npm install -g @lhci/cli@0.11.0
          lhci collect --url=http://localhost:4173
          lhci assert --preset=perf-budget
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
