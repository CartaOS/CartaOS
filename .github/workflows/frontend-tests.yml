name: Frontend Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  vitest:
    name: Vitest (Unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (Vitest)
        run: npm run test:run

  playwright:
    name: Playwright (E2E)
    if: ${{ hashFiles('frontend/playwright.config.*') != '' }}
    needs: vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build app for preview
        run: npm run build

      - name: Run Playwright tests
        run: npm run e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: frontend/e2e-artifacts/
          if-no-files-found: ignore
