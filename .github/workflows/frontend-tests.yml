name: Frontend Tests

concurrency:
  group: frontend-tests-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  vitest:
    name: Vitest (Unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (Vitest)
        run: npm run test:run

      - name: Upload unit test coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: warn

  playwright:
    name: Playwright (E2E)
    needs: vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Playwright config
        id: detect
        run: |
          if [ -f "playwright.config.ts" ] || [ -f "playwright.config.mjs" ] || [ -f "playwright.config.js" ] || [ -f "playwright.config.cjs" ]; then
            echo "has_config=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_config=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        if: ${{ steps.detect.outputs.has_config == 'true' }}
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: ${{ steps.detect.outputs.has_config == 'true' }}
        run: npm ci

      - name: Install Playwright Browsers (Chromium only)
        if: ${{ steps.detect.outputs.has_config == 'true' }}
        run: npx playwright install chromium

      - name: Build app for preview
        if: ${{ steps.detect.outputs.has_config == 'true' }}
        run: npm run build

      

      - name: Start Vite Preview Server (Foreground, direct output)
        if: ${{ steps.detect.outputs.has_config == 'true' }}
        run: npm run preview -- --port=4173

      

      - name: Run Playwright tests
        if: ${{ steps.detect.outputs.has_config == 'true' }}
        run: npm run e2e

      - name: Upload Playwright artifacts
        if: ${{ always() && steps.detect.outputs.has_config == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: frontend/e2e-artifacts/
          if-no-files-found: ignore
