input {
  beats {
    port => 5044
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^{.*}$/ {
    json {
      source => "message"
      target => "json_content"
    }
  }

  # Add timestamp from log
  if [json_content]["timestamp"] {
    date {
      match => ["[json_content][timestamp]", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Clean up fields
  mutate {
    add_field => {
      "level" => "%{[json_content][level]}"
      "logger" => "%{[json_content][logger]}"
      "module" => "%{[json_content][module]}"
      "function" => "%{[json_content][function]}"
      "line" => "%{[json_content][line]}"
      "message" => "%{[json_content][message]}"
    }
    remove_field => ["json_content"]
  }

  # Add GeoIP information for IP addresses
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }
}

output {
  # Print to console for debugging
  stdout { codec => rubydebug }

  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "cartaos-logs-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "${ELASTICSEARCH_PASSWORD}"
  }
}
